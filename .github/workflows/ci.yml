name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: build · test · clippy
    # macOS is the primary target; the default build needs no extra system
    # libraries here (no GPL features, platform-native audio/MIDI/WebView).
    runs-on: macos-latest
    steps:
      # mixr depends on tmnl-protocol by path — check it out alongside.
      - name: Checkout mixr
        uses: actions/checkout@v4
        with:
          path: mixr-rs
      # `token:` lets CI check out the private tmnl-protocol repo. Once
      # the family is public, the default token works — drop the
      # `token:` line and the SIBLING_CHECKOUT_TOKEN secret then.
      - name: Checkout tmnl-protocol
        uses: actions/checkout@v4
        with:
          repository: chris-mclennan/tmnl-protocol
          path: tmnl-protocol
          token: ${{ secrets.SIBLING_CHECKOUT_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: mixr-rs

      - name: build
        working-directory: mixr-rs
        run: cargo build --all-targets

      - name: test
        working-directory: mixr-rs
        run: cargo test

      # Hard-gated as of 2026-05 — the by-hand clippy pass landed in
      # 0ce173d / fe07bdb (76 → 0 warnings). No cargo fmt or clippy --fix
      # was used per the no-touch style policy; if a future commit
      # introduces a new warning, this gate forces it to surface in PR
      # review rather than silently accumulating.
      - name: clippy
        working-directory: mixr-rs
        run: cargo clippy --all-targets -- -D warnings
