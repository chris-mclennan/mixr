name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: fmt · build · test · clippy
    # macOS is the primary target; the default build needs no extra system
    # libraries here (no GPL features, platform-native audio/MIDI/WebView).
    runs-on: macos-latest
    steps:
      # mixr depends on tmnl-protocol by path — check it out alongside.
      - name: Checkout mixr
        uses: actions/checkout@v4
        with:
          path: mixr-rs
      - name: Checkout tmnl-protocol
        uses: actions/checkout@v4
        with:
          repository: chris-mclennan/tmnl-protocol
          path: tmnl-protocol

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: mixr-rs

      # Added 2026-05-24 when mixr-rs joined the family fmt policy
      # (1603-diff one-pass apply). The hand-format era is over;
      # future commits expected to be cargo fmt clean.
      - name: fmt
        working-directory: mixr-rs
        run: cargo fmt --all --check

      - name: build
        working-directory: mixr-rs
        run: cargo build --all-targets

      - name: test
        working-directory: mixr-rs
        run: cargo test

      # Hard-gated as of 2026-05-23 — the by-hand clippy pass landed in
      # 0ce173d / fe07bdb (76 → 0 warnings). New warnings surface in
      # PR review rather than silently accumulating. (`clippy --fix` is
      # still off-limits; the fmt rule was lifted on 2026-05-24.)
      - name: clippy
        working-directory: mixr-rs
        run: cargo clippy --all-targets -- -D warnings
